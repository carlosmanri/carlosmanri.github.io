baseURL: https://manrique.dev/
defaultContentLanguage: es
languages:
  es:
    label: Español
    locale: es-ES
    weight: 1
title: Carlos Manrique Enguita
theme: PaperMod

googleAnalytics: G-LZ04D7545K

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
pygmentsUseClasses: true

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: Carlos Manrique Enguita
  description: Perfil profesional, proyectos, notas y estantería técnica de Carlos Manrique Enguita.
  keywords:
    - Carlos Manrique Enguita
    - Software Engineering
    - Portfolio
    - CV
    - Hugo
    - Arquitectura de software
  schema:
    publisherType: Person
  author: Carlos Manrique
  defaultTheme: dark
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  homeInfoParams:
    Title: Carlos Manrique Enguita
    Content: >
      Ingeniero de Software full stack. Este sitio reúne mi experiencia profesional, proyectos, notas y lecturas técnicas.
  label:
    text: manrique.dev
  socialIcons:
    - name: github
      url: https://github.com/carlosmanri
    - name: linkedin
      url: https://www.linkedin.com/in/carlos-manrique-enguita/
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

menu:
  main:
    - identifier: home
      name: Inicio
      url: /
      weight: 1
    - identifier: cv
      name: CV
      url: /cv/
      weight: 2
    - identifier: bookshelf
      name: Estantería
      url: /bookshelf/
      weight: 4
    - identifier: notes
      name: Notas
      url: /posts/
      weight: 5
    - identifier: search
      name: Buscar
      url: /search/
      weight: 10
    - identifier: github
      name: GitHub
      url: https://github.com/carlosmanri
      weight: 20
    - identifier: linkedin
      name: LinkedIn
      url: https://www.linkedin.com/in/carlos-manrique-enguita/
      weight: 21


outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

caches:
  images:
    dir: :cacheDir/images
